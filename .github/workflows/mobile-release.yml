name: Mobile and TV Client Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag, e.g. movie-v1.0.0'
        required: true
        default: 'movie-v1.0.0'
      release_name:
        description: 'Release title'
        required: false
        default: '屠戮影视 1.0.0'

permissions:
  contents: write

env:
  CARGO_BUILD_JOBS: 2
  RUSTFLAGS: '-C codegen-units=1'

jobs:
  android-mobile-tv:
    name: Android Phone / Tablet / TV APK
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager 'ndk;27.0.12077973' 'platforms;android-35' 'build-tools;35.0.0'
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Initialize Android project
        run: npx tauri android init --ci

      - name: Apply Android TV launcher support
        run: node scripts/patch-android-tv-manifest.mjs

      - name: Build Android APK and AAB
        run: npx tauri android build --apk --aab --split-per-abi --ci

      - name: Collect Android artifacts
        shell: bash
        run: |
          mkdir -p release-assets
          find src-tauri/gen/android/app/build/outputs/apk -type f -name '*.apk' -print -exec cp {} release-assets/ \;
          find src-tauri/gen/android/app/build/outputs/bundle -type f -name '*.aab' -print -exec cp {} release-assets/ \; || true
          ls -lah release-assets

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TuluMovie-Android-Phone-TV
          path: release-assets/*
          if-no-files-found: error

      - name: Publish Android Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ inputs.release_name }}
          body: |
            屠戮影视 Android 手机端 / TV 端安装包。

            APK 已加入 Android TV Leanback 启动入口，可用于手机、平板和 Android TV。
            AAB 用于应用商店上传，不是普通用户直接安装包。
          files: release-assets/*
          make_latest: true
