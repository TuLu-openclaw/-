<body>
<div class="app" id="app">
  <div class="backdrop" id="backdrop"></div>
  <main class="stage" id="stage"><video class="video" id="video" playsinline webkit-playsinline preload="metadata"></video></main>
  <div class="center-hit"><div class="tapzone" data-zone="left"></div><div class="tapzone" data-zone="center"></div><div class="tapzone" data-zone="right"></div></div>
  <section class="chrome" id="chrome">
    <header class="topbar">
      <div class="brand">影</div><div class="titlebox"><div class="title" id="title">星枢播放器</div><div class="subtitle" id="subtitle">准备播放</div></div>
      <div class="top-actions"><button class="iconbtn" id="drawerBtn">选集</button><button class="iconbtn" id="closeBtn">关闭</button></div>
    </header>
    <footer class="bottombar">
      <div class="seekrow"><span class="time" id="curTime">0:00</span><div class="seek" id="seek"><div class="track"><div class="buffer" id="buffer"></div><div class="fill" id="fill"></div></div><div class="thumb" id="thumb"></div></div><span class="time" id="durTime">0:00</span></div>
      <div class="controls">
        <div class="group"><button class="pill" id="prevBtn">上集</button><button class="mainplay" id="playBtn">▶</button><button class="pill" id="nextBtn">下集</button></div>
        <div class="group"><button class="pill" id="muteBtn">音量</button><div class="volume" id="volume"><div class="volume-track"><div class="volume-fill" id="volumeFill"></div></div></div><button class="pill" id="speedBtn">1x</button><button class="pill" id="qualityBtn" style="display:none">清晰度</button><button class="pill" id="fitBtn">适应</button><button class="pill hide-mobile" id="pipBtn">小窗</button><button class="pill" id="fsBtn">全屏</button><button class="pill" id="settingsBtn">设置</button><button class="pill hide-mobile" id="helpBtn">键</button></div>
      </div>
    </footer>
  </section>
  <div class="toast" id="toast"></div>
  <div class="overlay show" id="overlay"><div><div class="loader" id="loader"></div><div class="message" id="message">正在加载...</div><div class="error" id="error" style="display:none"></div><button class="retry" id="retryBtn" style="display:none">重试</button></div></div>
  <aside class="drawer" id="drawer"><div class="poster"><img id="poster" alt="poster" /><div class="poster-fallback" id="posterFallback" style="display:none">影</div></div><div class="drawer-main"><div class="drawer-head"><div class="drawer-title" id="drawerTitle">选集与线路</div><div class="tabs"><button class="tab active" data-tab="episodes">选集</button><button class="tab" data-tab="lines">线路</button></div></div><div class="panel active" id="episodesPanel"></div><div class="panel" id="linesPanel"></div></div></aside>
  <section class="settings" id="settings"><h3>播放器设置</h3><label class="row"><span>解码模式</span><select id="decoder"><option value="auto">自动</option><option value="hlsjs">HLS.js</option><option value="native">系统原生</option></select></label><label class="row"><span>画面比例</span><select id="fit"><option value="contain">适应窗口</option><option value="cover">填满裁切</option><option value="fill">拉伸填充</option></select></label><label class="row"><span>自动下一集</span><input id="autoNext" type="checkbox" checked /></label><label class="row"><span>跳过片头</span><input id="skipIntro" type="number" min="0" max="600" value="0" /></label><label class="row"><span>跳过片尾</span><input id="skipOutro" type="number" min="0" max="600" value="0" /></label></section>
  <section class="shortcuts" id="shortcuts"><div class="shortcut"><b>Space</b><span>播放 / 暂停</span></div><div class="shortcut"><b>← →</b><span>快退 / 快进</span></div><div class="shortcut"><b>↑ ↓</b><span>音量</span></div><div class="shortcut"><b>F</b><span>全屏</span></div><div class="shortcut"><b>M</b><span>静音</span></div><div class="shortcut"><b>P / N</b><span>上一集 / 下一集</span></div></section>
  <div class="quality-menu" id="qualityMenu"></div><div class="speed-menu" id="speedMenu"></div>
</div>
<script>
(function(){
'use strict';
const qs=new URLSearchParams(location.search);const $=id=>document.getElementById(id);const video=$('video');
const state={url:qs.get('url')||'',title:safeDecode(qs.get('title')||'星枢播放器'),lang:qs.get('lang')||'zh-CN',resume:Number(qs.get('resume')||0)||0,pic:safeDecode(qs.get('pic')||''),ctx:parseJsonParam('playbackCtx')||parseJsonParam('playback_ctx')||{},eps:parseJsonParam('allEps')||parseJsonParam('all_eps')||[],urls:parseJsonParam('allUrls')||parseJsonParam('all_urls')||[],lines:parseJsonParam('allLines')||parseJsonParam('all_lines')||[],activeUrl:'',hls:null,loadTimer:null,idleTimer:null,reportTimer:0,cleanup:false,qualityLevels:[],speed:1,failures:new Set()};
if(!state.urls.length&&state.url)state.urls=[state.url];if(!state.eps.length&&state.url)state.eps=[{epName:state.ctx.epName||state.title,url:state.url,pic:state.pic}];state.activeUrl=state.url||state.urls[0]||'';
const els={chrome:$('chrome'),title:$('title'),subtitle:$('subtitle'),backdrop:$('backdrop'),overlay:$('overlay'),loader:$('loader'),message:$('message'),error:$('error'),retry:$('retryBtn'),toast:$('toast'),drawer:$('drawer'),drawerBtn:$('drawerBtn'),drawerTitle:$('drawerTitle'),episodes:$('episodesPanel'),lines:$('linesPanel'),poster:$('poster'),posterFallback:$('posterFallback'),cur:$('curTime'),dur:$('durTime'),seek:$('seek'),fill:$('fill'),buffer:$('buffer'),thumb:$('thumb'),play:$('playBtn'),prev:$('prevBtn'),next:$('nextBtn'),mute:$('muteBtn'),volume:$('volume'),volumeFill:$('volumeFill'),speed:$('speedBtn'),speedMenu:$('speedMenu'),quality:$('qualityBtn'),qualityMenu:$('qualityMenu'),fitBtn:$('fitBtn'),pip:$('pipBtn'),fs:$('fsBtn'),settingsBtn:$('settingsBtn'),settings:$('settings'),help:$('helpBtn'),shortcuts:$('shortcuts'),close:$('closeBtn'),decoder:$('decoder'),fit:$('fit'),autoNext:$('autoNext'),skipIntro:$('skipIntro'),skipOutro:$('skipOutro')};
init();
function safeDecode(v){try{return decodeURIComponent(v||'')}catch{return v||''}}function parseJsonParam(name){let raw=qs.get(name);if(!raw)return null;try{return JSON.parse(raw)}catch{try{return JSON.parse(decodeURIComponent(raw))}catch{return null}}}
function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function fmt(s){if(!isFinite(s)||s<0)return '0:00';s=Math.floor(s);let h=Math.floor(s/3600),m=Math.floor((s%3600)/60),x=s%60;return h?`${h}:${String(m).padStart(2,'0')}:${String(x).padStart(2,'0')}`:`${m}:${String(x).padStart(2,'0')}`}
function toast(text){els.toast.textContent=text;els.toast.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>els.toast.classList.remove('show'),900)}
function setOverlay(text,error){els.overlay.classList.add('show');els.message.textContent=text||'正在加载...';els.loader.style.display=error?'none':'block';els.error.style.display=error?'block':'none';els.error.textContent=error?text:'';els.retry.style.display=error?'inline-block':'none'}function hideOverlay(){els.overlay.classList.remove('show');clearTimeout(state.loadTimer)}
function currentEp(){return state.eps.find(e=>e&&e.url===state.activeUrl)||null}function currentIndex(){let idx=state.urls.indexOf(state.activeUrl);return idx>=0?idx:0}function epName(ep,i){return (ep&&(ep.epName||ep.name))||`第 ${i+1} 集`}function cleanTitle(t){return String(t||'星枢播放器').replace(/\s+/g,' ').trim()}
function syncTitle(){let ep=currentEp();let name=cleanTitle(state.title);let sub=epName(ep,currentIndex());els.title.textContent=sub&&name.indexOf(sub)<0?`${name} · ${sub}`:name;els.subtitle.textContent=[state.ctx.source||state.ctx.type||'',state.ctx.year||'',state.ctx.area||''].filter(Boolean).join(' · ')||'星枢播放器';document.title=els.title.textContent;els.drawerTitle.textContent=cleanTitle(state.title)}
function init(){loadSettings();syncTitle();setPoster(state.pic);renderDrawer();bindEvents();applySettings();syncControls();playUrl(state.activeUrl,state.resume);showChrome();}
function setPoster(src){if(src){els.poster.src=src;els.poster.style.display='block';els.posterFallback.style.display='none';els.backdrop.style.backgroundImage=`url(${JSON.stringify(src).slice(1,-1)})`}else{els.poster.style.display='none';els.posterFallback.style.display='grid'}}
function renderDrawer(){els.episodes.innerHTML='';els.lines.innerHTML='';if(state.eps.length){state.eps.forEach((ep,i)=>{let b=document.createElement('button');b.className='card'+(ep.url===state.activeUrl?' active':'');b.innerHTML=`<strong>${esc(epName(ep,i))}</strong><small>${ep.url===state.activeUrl?'当前播放':'点击播放'}</small>`;b.onclick=()=>{closePanels();playUrl(ep.url,0,ep.pic||state.pic)};els.episodes.appendChild(b)})}else els.episodes.innerHTML='<div class="card"><strong>暂无选集</strong><small>请从详情页重新进入</small></div>';let lines=(state.lines||[]).filter(l=>l&&Array.isArray(l.urls)&&l.urls.length);if(lines.length){let epIdx=Math.max(0,state.eps.findIndex(e=>e&&e.url===state.activeUrl));lines.forEach((line,i)=>{let target=line.urls[epIdx]||line.urls[0];let active=line.urls.some(e=>e&&e.url===state.activeUrl);let b=document.createElement('button');b.className='card'+(active?' active':'');b.innerHTML=`<strong>${esc(line.name||`线路 ${i+1}`)}</strong><small>${active?'当前线路':line.urls.length+' 集'}</small>`;b.onclick=()=>{state.eps=line.urls.map(e=>({epName:e.epName||e.name,url:e.url,pic:e.pic}));state.urls=state.eps.map(e=>e.url).filter(Boolean);closePanels();playUrl(target.url,0,target.pic||state.pic)};els.lines.appendChild(b)})}else{state.urls.forEach((u,i)=>{let b=document.createElement('button');b.className='card'+(u===state.activeUrl?' active':'');b.innerHTML=`<strong>${esc(epName(state.eps[i],i))}</strong><small>${u===state.activeUrl?'当前':'备用地址'}</small>`;b.onclick=()=>{closePanels();playUrl(u,0,state.pic)};els.lines.appendChild(b)});if(!state.urls.length)els.lines.innerHTML='<div class="card"><strong>暂无线路</strong><small>没有可播放地址</small></div>'}}
function bindEvents(){els.play.onclick=()=>video.paused?video.play().catch(()=>{}):video.pause();els.prev.onclick=()=>jump(-1);els.next.onclick=()=>jump(1);els.mute.onclick=()=>{video.muted=!video.muted;syncControls()};els.volume.onclick=e=>{let r=els.volume.getBoundingClientRect();video.volume=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));video.muted=false;syncControls()};els.seek.onclick=e=>{if(!video.duration)return;let r=els.seek.getBoundingClientRect();video.currentTime=(e.clientX-r.left)/r.width*video.duration};els.drawerBtn.onclick=e=>{e.stopPropagation();toggleDrawer('episodes')};els.settingsBtn.onclick=e=>{e.stopPropagation();toggleOnly(els.settings)};els.help&& (els.help.onclick=e=>{e.stopPropagation();toggleOnly(els.shortcuts)});els.close.onclick=closeWindow;els.retry.onclick=()=>playUrl(state.activeUrl,0,state.pic,true);els.fitBtn.onclick=()=>{let values=['contain','cover','fill'];let i=values.indexOf(els.fit.value);els.fit.value=values[(i+1)%values.length];saveSettings();applySettings();toast('画面：'+fitText())};els.fit.onchange=()=>{saveSettings();applySettings()};els.decoder.onchange=()=>{saveSettings();playUrl(state.activeUrl,video.currentTime,state.pic,true)};els.autoNext.onchange=saveSettings;els.skipIntro.onchange=saveSettings;els.skipOutro.onchange=saveSettings;els.fs.onclick=toggleFullscreen;els.pip.onclick=()=>{try{document.pictureInPictureElement?document.exitPictureInPicture():video.requestPictureInPicture&&video.requestPictureInPicture()}catch{}};els.speed.onclick=e=>{e.stopPropagation();showSpeedMenu()};els.quality.onclick=e=>{e.stopPropagation();toggleOnly(els.qualityMenu)};document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>switchTab(t.dataset.tab));document.querySelectorAll('.tapzone').forEach(z=>z.addEventListener('click',()=>handleTap(z.dataset.zone)));document.addEventListener('click',e=>{if(!e.target.closest('.drawer,.settings,.shortcuts,.quality-menu,.speed-menu,.iconbtn,.pill'))closePanels()});['mousemove','touchstart','keydown'].forEach(ev=>document.addEventListener(ev,showChrome,{passive:true}));document.addEventListener('keydown',hotkey);video.addEventListener('timeupdate',onTime);video.addEventListener('progress',updateBuffer);video.addEventListener('loadedmetadata',()=>{els.dur.textContent=fmt(video.duration);applyResume();hideOverlay()});video.addEventListener('canplay',hideOverlay);video.addEventListener('play',()=>{els.play.textContent='Ⅱ';syncControls();showChrome()});video.addEventListener('pause',()=>{els.play.textContent='▶';syncControls();showChrome()});video.addEventListener('ended',()=>{reportEnded();if(els.autoNext.checked)jump(1)});window.addEventListener('beforeunload',()=>cleanup(true));window.addEventListener('pagehide',()=>cleanup(true));}
function switchTab(name){document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));els.episodes.classList.toggle('active',name==='episodes');els.lines.classList.toggle('active',name==='lines')}function toggleDrawer(tab){switchTab(tab||'episodes');els.drawer.classList.toggle('open');els.settings.classList.remove('open');els.shortcuts.classList.remove('open')}function toggleOnly(el){[els.settings,els.shortcuts,els.qualityMenu,els.speedMenu].forEach(x=>{if(x!==el)x.classList.remove('open')});el.classList.toggle('open')}function closePanels(){els.drawer.classList.remove('open');els.settings.classList.remove('open');els.shortcuts.classList.remove('open');els.qualityMenu.classList.remove('open');els.speedMenu.classList.remove('open')}
function showChrome(){els.chrome.classList.remove('hidden');clearTimeout(state.idleTimer);state.idleTimer=setTimeout(()=>{if(!video.paused&&!els.drawer.classList.contains('open')&&!els.settings.classList.contains('open'))els.chrome.classList.add('hidden')},3200)}
function handleTap(zone){showChrome();if(zone==='center'){video.paused?video.play().catch(()=>{}):video.pause();return}if(zone==='left'){video.currentTime=Math.max(0,video.currentTime-10);toast('-10s')}if(zone==='right'){video.currentTime=Math.min(video.duration||video.currentTime+10,video.currentTime+10);toast('+10s')}}
function jump(delta){let idx=currentIndex()+delta;if(idx<0||idx>=state.urls.length){toast(delta>0?'没有下一集':'没有上一集');return}playUrl(state.urls[idx],0,state.pic)}
async function playUrl(newUrl,startAt=0,newPic='',retry=false){if(!newUrl){setOverlay('没有可播放地址',true);return}state.activeUrl=newUrl;if(newPic)setPoster(newPic);syncTitle();renderDrawer();syncControls();setOverlay('正在加载...');clearTimeout(state.loadTimer);state.loadTimer=setTimeout(()=>tryFallback('加载超时'),18000);if(state.hls){try{state.hls.destroy()}catch{}state.hls=null}video.removeAttribute('src');video.load();let src=newUrl;try{src=decodeURIComponent(src)}catch{}video._lastUrl=src;let isM3u8=/\.m3u8(\?|#|$)/i.test(src);let decoder=els.decoder.value||'auto';try{if(isM3u8&&(decoder==='hlsjs'||(!video.canPlayType('application/vnd.apple.mpegurl')&&decoder!=='native'))){await ensureHls();state.hls=new Hls({enableWorker:true,lowLatencyMode:false});state.hls.loadSource(src);state.hls.attachMedia(video);state.hls.on(Hls.Events.MANIFEST_PARSED,()=>{buildQualityMenu();video.play().catch(()=>{});if(startAt)seekWhenReady(startAt)});state.hls.on(Hls.Events.ERROR,(evt,data)=>{if(data&&data.fatal){if(data.type===Hls.ErrorTypes.NETWORK_ERROR)tryFallback('网络错误');else if(data.type===Hls.ErrorTypes.MEDIA_ERROR){try{state.hls.recoverMediaError()}catch{tryFallback('播放错误')}}else tryFallback('播放错误')}})}else{video.src=src;video.addEventListener('loadedmetadata',()=>{if(startAt)seekWhenReady(startAt)},{once:true});video.addEventListener('error',()=>tryFallback('视频加载失败'),{once:true});video.play().catch(()=>{})}}catch(e){tryFallback(e.message||'播放失败')}}
function seekWhenReady(t){let done=false;let apply=()=>{if(done)return;if(video.duration||video.readyState>0){video.currentTime=Math.max(0,Math.min(Number(t)||0,(video.duration||Number(t)||0)-1));done=true}};apply();let n=0,timer=setInterval(()=>{apply();if(done||++n>20)clearInterval(timer)},250)}
function tryFallback(reason){clearTimeout(state.loadTimer);state.failures.add(state.activeUrl);let idx=currentIndex();for(let i=idx+1;i<state.urls.length;i++){if(!state.failures.has(state.urls[i])){toast(reason+'，切换备用线路');playUrl(state.urls[i],0,state.pic,true);return}}setOverlay(reason+'，没有更多可用线路',true)}
function ensureHls(){return new Promise((resolve,reject)=>{if(window.Hls)return resolve();let s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/hls.js@latest';s.onload=()=>resolve();s.onerror=()=>reject(new Error('HLS 组件加载失败'));document.head.appendChild(s)})}
function buildQualityMenu(){let h=state.hls;if(!h||!h.levels||!h.levels.length){els.quality.style.display='none';return}els.quality.style.display='inline-flex';els.qualityMenu.innerHTML='';let auto=menuBtn('自动',()=>{h.currentLevel=-1;els.quality.textContent='自动';closePanels()});auto.classList.add('active');els.qualityMenu.appendChild(auto);h.levels.forEach((l,i)=>els.qualityMenu.appendChild(menuBtn((l.height?l.height+'p':'线路 '+(i+1)),()=>{h.currentLevel=i;els.quality.textContent=l.height?l.height+'p':'清晰度';closePanels()})))}function menuBtn(text,fn){let b=document.createElement('button');b.className='menuitem';b.textContent=text;b.onclick=fn;return b}
function showSpeedMenu(){els.speedMenu.innerHTML='';[0.75,1,1.25,1.5,2].forEach(s=>{let b=menuBtn(s===1?'正常':s+'x',()=>{state.speed=s;video.playbackRate=s;els.speed.textContent=s===1?'1x':s+'x';closePanels()});if(video.playbackRate===s)b.classList.add('active');els.speedMenu.appendChild(b)});toggleOnly(els.speedMenu)}
function onTime(){let d=video.duration||0,c=video.currentTime||0;els.cur.textContent=fmt(c);if(isFinite(d)&&d>0){let p=c/d*100;els.fill.style.width=p+'%';els.thumb.style.left=p+'%';els.dur.textContent=fmt(d)}let intro=Number(els.skipIntro.value||0);if(intro&&c>0&&c<intro)video.currentTime=intro;let outro=Number(els.skipOutro.value||0);if(outro&&d&&d-c<outro&&els.autoNext.checked)jump(1);if(Date.now()-state.reportTimer>5000){state.reportTimer=Date.now();reportProgress(c,d)}}function updateBuffer(){try{if(!video.buffered.length||!video.duration)return;let end=video.buffered.end(video.buffered.length-1);els.buffer.style.width=Math.min(100,end/video.duration*100)+'%'}catch{}}
function syncControls(){els.play.textContent=video.paused?'▶':'Ⅱ';els.mute.textContent=(video.muted||video.volume===0)?'静音':'音量';els.volumeFill.style.width=((video.muted?0:video.volume)*100)+'%';let idx=currentIndex();els.prev.disabled=idx<=0;els.next.disabled=idx>=state.urls.length-1;els.fitBtn.textContent=fitText()}function fitText(){return ({contain:'适应',cover:'填满',fill:'拉伸'})[els.fit.value]||'适应'}
function loadSettings(){try{let s=JSON.parse(localStorage.getItem('xingshu-player-v2')||'{}');els.decoder.value=s.decoder||'auto';els.fit.value=s.fit||'contain';els.autoNext.checked=s.autoNext!==false;els.skipIntro.value=s.skipIntro||0;els.skipOutro.value=s.skipOutro||0;video.volume=s.volume==null?.8:s.volume}catch{video.volume=.8}}function saveSettings(){try{localStorage.setItem('xingshu-player-v2',JSON.stringify({decoder:els.decoder.value,fit:els.fit.value,autoNext:els.autoNext.checked,skipIntro:Number(els.skipIntro.value||0),skipOutro:Number(els.skipOutro.value||0),volume:video.volume}))}catch{}}function applySettings(){video.style.objectFit=els.fit.value||'contain';syncControls()}video.addEventListener('volumechange',()=>{saveSettings();syncControls()});
function hotkey(e){if(e.target&&/input|select|textarea/i.test(e.target.tagName))return;showChrome();switch(e.key){case' ':e.preventDefault();els.play.click();break;case'ArrowLeft':video.currentTime=Math.max(0,video.currentTime-10);toast('-10s');break;case'ArrowRight':video.currentTime=Math.min(video.duration||video.currentTime+10,video.currentTime+10);toast('+10s');break;case'ArrowUp':video.volume=Math.min(1,video.volume+.05);video.muted=false;break;case'ArrowDown':video.volume=Math.max(0,video.volume-.05);break;case'f':case'F':toggleFullscreen();break;case'm':case'M':els.mute.click();break;case'p':case'P':jump(-1);break;case'n':case'N':jump(1);break;case'Escape':if(document.fullscreenElement)document.exitFullscreen();else if(els.drawer.classList.contains('open')||els.settings.classList.contains('open'))closePanels();else closeWindow();break}}
function toggleFullscreen(){if(document.fullscreenElement)document.exitFullscreen();else document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen().catch(()=>{})}
function tauriInvoke(){let t=window.__TAURI__||window.__TAURI_INTERNALS__;return t&&((t.core&&t.core.invoke)||t.invoke)}function progressPayload(type){return {type,url:state.activeUrl||video.currentSrc||video.src,title:els.title.textContent,currentTime:video.currentTime||0,duration:video.duration||0,playbackCtx:state.ctx}}
function reportProgress(){let invoke=tauriInvoke();let payload=progressPayload('playerProgress');if(invoke)invoke('player_report_event',{payload}).catch(()=>postMessageBridge(payload));else postMessageBridge(payload)}function reportEnded(){let payload=progressPayload('playerEnded');let invoke=tauriInvoke();if(invoke)invoke('player_report_event',{payload}).catch(()=>postMessageBridge(payload));else postMessageBridge(payload)}function postMessageBridge(payload){try{window.opener&&window.opener.postMessage({channel:'xingshu-player-progress',data:payload},'*')}catch{}}
function cleanup(save){if(state.cleanup)return;state.cleanup=true;if(save)reportProgress();if(state.hls)try{state.hls.destroy()}catch{}}function closeWindow(){cleanup(true);try{window.close()}catch{}}
})();
