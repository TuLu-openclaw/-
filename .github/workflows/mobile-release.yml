name: Mobile and TV Client Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release version (e.g. v4.3.8)"
        required: false
        type: string
        default: ""

permissions:
  contents: write

env:
  TAG_NAME: ${{ github.event.inputs.tag_name || github.ref_name }}
  CARGO_BUILD_JOBS: 2
  RUSTFLAGS: "-C codegen-units=1"

jobs:
  android-mobile-tv:
    name: Android Phone / Tablet / TV Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK and NDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.0.12077973" "platforms;android-35" "build-tools;35.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: npm ci --prefer-offline

      - name: Verify version tag
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          EXPECTED="v${VERSION}"
          if [ "${TAG_NAME}" != "${EXPECTED}" ]; then
            echo "Release tag ${TAG_NAME} does not match package.json version ${VERSION} (expected ${EXPECTED})" >&2
            exit 1
          fi

      - name: Prepare bundled runtime
        run: node scripts/prepare-runtime.mjs linux-x64

      - name: Initialize Android project
        run: npx tauri android init --ci

      - name: Apply TV client manifest hints
        run: node scripts/patch-android-tv-manifest.mjs

      - name: Build Android APK and AAB
        run: npx tauri android build --apk --aab --split-per-abi --ci

      - name: Normalize artifact tag
        shell: bash
        run: |
          SAFE_TAG_NAME="${TAG_NAME//\//-}"
          echo "SAFE_TAG_NAME=$SAFE_TAG_NAME" >> "$GITHUB_ENV"

      - name: Upload Android APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: XingShuOpenClaw-${{ env.SAFE_TAG_NAME }}-Android-Mobile-TV-APK
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk

      - name: Upload Android AAB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: XingShuOpenClaw-${{ env.SAFE_TAG_NAME }}-Android-Mobile-TV-AAB
          path: src-tauri/gen/android/app/build/outputs/bundle/**/*.aab

  apple-mobile-readiness:
    name: Apple iPhone / iPad / Apple TV Readiness
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Explain Apple mobile signing requirement
        run: |
          cat <<'EOF'
          Apple iOS/iPadOS/tvOS installable client builds require an Apple Developer Team,
          signing certificate, provisioning profiles, and an iOS/tvOS project generated on macOS.
          This repository currently builds macOS desktop DMG in release.yml.
          Add Apple signing secrets before producing signed IPA/TestFlight artifacts.
          EOF

  harmonyos-readiness:
    name: Huawei HarmonyOS Readiness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Explain HarmonyOS client requirement
        run: |
          cat <<'EOF'
          Huawei HarmonyOS NEXT native clients require a DevEco Studio / ArkTS / HAP project
          and Huawei signing material. Tauri Android APK can cover HarmonyOS devices that support
          Android compatibility, but HarmonyOS NEXT HAP is a separate native client target.
          EOF
