name: Build Tulu Movie Client

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag, e.g. movie-v1.0.0'
        required: true
        default: 'movie-v1.0.0'
      release_name:
        description: 'Release title'
        required: false
        default: '屠戮影视 1.0.0'
  push:
    tags:
      - 'movie-v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc
          - name: windows-arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            args: --target aarch64-pc-windows-msvc
          - name: macos-intel
            os: macos-13
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - name: macos-apple-silicon
            os: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - name: linux-x64
            os: ubuntu-22.04
            target: ''
            args: ''
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri -- build ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tulu-movie-${{ matrix.name }}
          path: |
            src-tauri/target/**/release/bundle/nsis/*setup.exe
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-22.04
    if: always() && needs.build.result == 'success'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.deb' -o -name '*.AppImage' \) -print -exec cp {} release-assets/ \;
          ls -lah release-assets

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "name=${{ inputs.release_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=屠戮影视 ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          body: |
            屠戮影视独立多平台客户端。

            包含：影视点播、片库、播放记录、收藏、独立播放器。
            不包含：OpenClaw 管理后台、AI、频道、Skills 等无关功能。
          files: release-assets/*
          make_latest: true
